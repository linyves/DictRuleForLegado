name: Update dictrule.json

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-dictrule:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate dictrule.json
        run: python scripts/build_dictrule.py

      - name: Commit updated config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add dictrule.json
            git commit -m "chore: regenerate dictrule.json"
            git push
          fi
